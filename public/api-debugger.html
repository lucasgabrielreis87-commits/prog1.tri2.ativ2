<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>
    <div>
        <input name="url">
        <select name="method">
            <option>GET</option>
            <option>POST</option>]
            <option>PUT</option>
            <option>DELETE</option>
        </select>
        <textarea name="body"></textarea>
        <button id="executa">Executar</button>
    </div>
    <pre>resultado aqui</pre>
    <script>
        const elurl = document.querySelector('[name = "url"]')
        const elMethod = document.querySelector('[name = "method"]')
        const elBody = document.querySelector('[name = "body"]')
        const btExec = document.querySelector('#execute')
        const result = document.querySelector('[#result]')

        btExec.addEventListener('click', async ev => {
            const request = await fetch (elurl.value,{
                method: elMethod.value,
                body: elBody.value.trim() === '' ? undefined : elbody.value,
            })
            const response = await request.text()
            result.innerHTML = response
        })

    </script>

</body>
</html>
